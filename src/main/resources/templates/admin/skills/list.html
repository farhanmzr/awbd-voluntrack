<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head('Manage Skills')}"></head>

<body>

    <div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="mb-1">Manage Skills</h1>
                <p class="text-muted mb-0">Manage available skills that users can add to their profile.</p>
            </div>
            <a class="btn btn-primary" th:href="@{/admin/skills/create}">Create New Skill</a>
        </div>

        <div th:if="${param.saved}" class="alert alert-success">
            Skill saved successfully.
        </div>

        <div th:if="${param.deleted}" class="alert alert-success">
            Skill deleted successfully.
        </div>

        <div th:if="${param.deleteError}" class="alert alert-danger">
            This skill cannot be deleted because it is already used by one or more users.
        </div>

        <div th:if="${#lists.isEmpty(skills)}" class="alert alert-info">
            No skills found.
        </div>

        <div th:unless="${#lists.isEmpty(skills)}" class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Skill Name</th>
                                <th style="width: 160px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="skill : ${skills}">
                                <td th:text="${skill.id}">1</td>
                                <td th:text="${skill.name}">Teaching</td>
                                <td>
                                    <a class="btn btn-sm btn-outline-warning me-1"
                                        th:href="@{/admin/skills/edit/{id}(id=${skill.id})}">
                                        Edit
                                    </a>
                                    <a class="btn btn-sm btn-outline-danger"
                                        th:href="@{/admin/skills/delete/{id}(id=${skill.id})}"
                                        onclick="return confirm('Are you sure you want to delete this skill?');">
                                        Delete
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer-scripts :: scripts}"></div>

</body>

</html>
