<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head('Admin Profile')}"></head>

<body>

    <div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="mb-1">Admin Profile</h1>
                <p class="text-muted mb-0">Manage your administrator profile.</p>
            </div>
            <a class="btn btn-primary" th:href="@{/admin/profile/edit}">Edit Profile</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="row g-4">
                    <div class="col-md-6">
                        <p class="text-muted mb-1">Full Name</p>
                        <h5 th:text="${profile.fullName != null ? profile.fullName : '-'}">-</h5>
                    </div>

                    <div class="col-md-6">
                        <p class="text-muted mb-1">Phone Number</p>
                        <h5 th:text="${profile.phoneNumber != null ? profile.phoneNumber : '-'}">-</h5>
                    </div>

                    <div class="col-md-6">
                        <p class="text-muted mb-1">City</p>
                        <h5 th:text="${profile.city != null ? profile.city : '-'}">-</h5>
                    </div>

                    <div class="col-md-6">
                        <p class="text-muted mb-1">Date of Birth</p>
                        <h5 th:text="${profile.dateOfBirth != null ? profile.dateOfBirth : '-'}">-</h5>
                    </div>

                    <div class="col-12">
                        <p class="text-muted mb-1">Bio</p>
                        <p class="mb-0" th:text="${profile.bio != null ? profile.bio : '-'}">-</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer-scripts :: scripts}"></div>

</body>

</html>
