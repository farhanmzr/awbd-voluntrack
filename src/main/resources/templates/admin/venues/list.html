<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head('Manage Venues')}"></head>

<body>

    <div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0">Manage Venues</h1>
            <a class="btn btn-primary" th:href="@{/admin/venues/create}">Create New Venue</a>
        </div>

        <div th:if="${#lists.isEmpty(venues)}" class="alert alert-info">
            No venues found.
        </div>

        <div th:unless="${#lists.isEmpty(venues)}" class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Address</th>
                                <th>City</th>
                                <th>Description</th>
                                <th style="width: 140px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="venue : ${venues}">
                                <td th:text="${venue.id}">1</td>
                                <td th:text="${venue.name}">Venue Name</td>
                                <td th:text="${venue.address}">Address</td>
                                <td th:text="${venue.city}">City</td>
                                <td th:text="${venue.description}">Description</td>
                                <td>
                                    <a class="btn btn-sm btn-outline-warning me-1"
                                        th:href="@{/admin/venues/edit/{id}(id=${venue.id})}">
                                        Edit
                                    </a>
                                    <a class="btn btn-sm btn-outline-danger"
                                        th:href="@{/admin/venues/delete/{id}(id=${venue.id})}"
                                        onclick="return confirm('Are you sure you want to delete this venue?');">
                                        Delete
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer-scripts :: scripts}"></div>

</body>

</html>
