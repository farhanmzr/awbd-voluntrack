<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Form</title>
</head>

<body>
    <h1 th:text="${event.id == null} ? 'Create Event' : 'Edit Event'">Event Form</h1>

    <a th:href="@{/admin/events}">Back to Event List</a>
    <br><br>

    <form th:action="@{${formAction}}" th:object="${event}" method="post">
        <input type="hidden" th:field="*{id}">

        <div>
            <label for="title">Title:</label><br>
            <input type="text" id="title" th:field="*{title}" required>
        </div>

        <div th:if="${#fields.hasErrors('title')}" style="color:red;">
            <p th:errors="*{title}"></p>
        </div>

        <br>

        <div>
            <label for="description">Description:</label><br>
            <textarea id="description" th:field="*{description}" rows="4" cols="50" required></textarea>
        </div>

        <div th:if="${#fields.hasErrors('description')}" style="color:red;">
            <p th:errors="*{description}"></p>
        </div>

        <br>

        <div>
            <label for="startDateTime">Start Date & Time:</label><br>
            <input type="datetime-local" id="startDateTime" name="startDateTime"
                th:value="${event.startDateTime != null ? #temporals.format(event.startDateTime, 'yyyy-MM-dd''T''HH:mm') : ''}"
                required>
        </div>

        <div th:if="${#fields.hasErrors('startDateTime')}" style="color:red;">
            <p th:errors="*{startDateTime}"></p>
        </div>

        <br>

        <div>
            <label for="endDateTime">End Date & Time:</label><br>
            <input type="datetime-local" id="endDateTime" name="endDateTime"
                th:value="${event.endDateTime != null ? #temporals.format(event.endDateTime, 'yyyy-MM-dd''T''HH:mm') : ''}"
                required>
        </div>

        <div th:if="${#fields.hasErrors('endDateTime')}" style="color:red;">
            <p th:errors="*{endDateTime}"></p>
        </div>

        <br>

        <div>
            <label for="capacity">Capacity:</label><br>
            <input type="number" id="capacity" th:field="*{capacity}" min="1" required>
        </div>

        <div th:if="${#fields.hasErrors('capacity')}" style="color:red;">
            <p th:errors="*{capacity}"></p>
        </div>

        <br>

        <div>
            <label for="status">Status:</label><br>
            <select id="status" th:field="*{status}" required>
                <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}">
                </option>
            </select>
        </div>

        <div th:if="${#fields.hasErrors('status')}" style="color:red;">
            <p th:errors="*{status}"></p>
        </div>

        <br>

        <div>
            <label for="category">Category:</label><br>
            <select id="category" name="categoryId" required>
                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"
                    th:selected="${event.category != null and event.category.id == category.id}">
                </option>
            </select>
        </div>

        <br>

        <div>
            <label for="venue">Venue:</label><br>
            <select id="venue" name="venueId" required>
                <option th:each="venue : ${venues}" th:value="${venue.id}" th:text="${venue.name + ' - ' + venue.city}"
                    th:selected="${event.venue != null and event.venue.id == venue.id}">
                </option>
            </select>
        </div>

        <br>

        <button type="submit">Save</button>
    </form>
</body>

</html>
