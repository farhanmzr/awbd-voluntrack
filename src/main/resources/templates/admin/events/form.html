<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head('Event Form')}"></head>

<body>

    <div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="mb-4" th:text="${event.id == null} ? 'Create Event' : 'Edit Event'">
                            Event Form
                        </h1>

                        <a class="btn btn-outline-secondary btn-sm mb-4" th:href="@{/admin/events}">
                            Back to Event List
                        </a>

                        <form th:action="@{${formAction}}" th:object="${event}" method="post">
                            <input type="hidden" th:field="*{id}">

                            <div class="mb-3">
                                <label for="title" class="form-label">Title</label>
                                <input type="text" id="title" th:field="*{title}" class="form-control" required>
                                <div th:if="${#fields.hasErrors('title')}" class="text-danger mt-1">
                                    <small th:errors="*{title}"></small>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea id="description" th:field="*{description}" class="form-control" rows="4"
                                    required></textarea>
                                <div th:if="${#fields.hasErrors('description')}" class="text-danger mt-1">
                                    <small th:errors="*{description}"></small>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="startDateTime" class="form-label">Start Date & Time</label>
                                    <input type="datetime-local" id="startDateTime" name="startDateTime"
                                        class="form-control"
                                        th:value="${event.startDateTime != null ? #temporals.format(event.startDateTime, 'yyyy-MM-dd''T''HH:mm') : ''}"
                                        required>
                                    <div th:if="${#fields.hasErrors('startDateTime')}" class="text-danger mt-1">
                                        <small th:errors="*{startDateTime}"></small>
                                    </div>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="endDateTime" class="form-label">End Date & Time</label>
                                    <input type="datetime-local" id="endDateTime" name="endDateTime"
                                        class="form-control"
                                        th:value="${event.endDateTime != null ? #temporals.format(event.endDateTime, 'yyyy-MM-dd''T''HH:mm') : ''}"
                                        required>
                                    <div th:if="${#fields.hasErrors('endDateTime')}" class="text-danger mt-1">
                                        <small th:errors="*{endDateTime}"></small>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="capacity" class="form-label">Capacity</label>
                                <input type="number" id="capacity" th:field="*{capacity}" class="form-control" min="1"
                                    required>
                                <div th:if="${#fields.hasErrors('capacity')}" class="text-danger mt-1">
                                    <small th:errors="*{capacity}"></small>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="status" class="form-label">Status</label>
                                <select id="status" th:field="*{status}" class="form-select" required>
                                    <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}">
                                    </option>
                                </select>
                                <div th:if="${#fields.hasErrors('status')}" class="text-danger mt-1">
                                    <small th:errors="*{status}"></small>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="category" class="form-label">Category</label>
                                <select id="category" name="categoryId" class="form-select" required>
                                    <option th:each="category : ${categories}" th:value="${category.id}"
                                        th:text="${category.name}"
                                        th:selected="${event.category != null and event.category.id == category.id}">
                                    </option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label for="venue" class="form-label">Venue</label>
                                <select id="venue" name="venueId" class="form-select" required>
                                    <option th:each="venue : ${venues}" th:value="${venue.id}"
                                        th:text="${venue.name + ' - ' + venue.city}"
                                        th:selected="${event.venue != null and event.venue.id == venue.id}">
                                    </option>
                                </select>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">Save Event</button>
                                <a th:href="@{/admin/events}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer-scripts :: scripts}"></div>

</body>

</html>
