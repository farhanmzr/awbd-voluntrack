<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head('Manage Registrations')}"></head>

<body>

    <div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

    <div class="container py-4">
        <div class="mb-4">
            <h1 class="mb-0">Manage Registrations</h1>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form method="get" th:action="@{/admin/registrations}" class="row g-3">
                    <div class="col-md-4">
                        <label for="status" class="form-label">Filter by Status</label>
                        <select name="status" id="status" class="form-select">
                            <option value="PENDING" th:selected="${selectedStatus.name() == 'PENDING'}">PENDING</option>
                            <option value="APPROVED" th:selected="${selectedStatus.name() == 'APPROVED'}">APPROVED
                            </option>
                            <option value="REJECTED" th:selected="${selectedStatus.name() == 'REJECTED'}">REJECTED
                            </option>
                            <option value="CANCELLED" th:selected="${selectedStatus.name() == 'CANCELLED'}">CANCELLED
                            </option>
                            <option value="ATTENDED" th:selected="${selectedStatus.name() == 'ATTENDED'}">ATTENDED
                            </option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label for="sortField" class="form-label">Sort by</label>
                        <select name="sortField" id="sortField" class="form-select">
                            <option value="registrationDate" th:selected="${sortField == 'registrationDate'}">
                                Registration Date</option>
                            <option value="status" th:selected="${sortField == 'status'}">Status</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label for="sortDir" class="form-label">Direction</label>
                        <select name="sortDir" id="sortDir" class="form-select">
                            <option value="asc" th:selected="${sortDir == 'asc'}">Ascending</option>
                            <option value="desc" th:selected="${sortDir == 'desc'}">Descending</option>
                        </select>
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-outline-primary w-100">Apply</button>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(registrations)}" class="alert alert-info">
            No registrations found for this status.
        </div>

        <div th:unless="${#lists.isEmpty(registrations)}" class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>User</th>
                                <th>Event</th>
                                <th>Status</th>
                                <th>Registration Date</th>
                                <th style="width: 180px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="registration : ${registrations}">
                                <td th:text="${registration.id}">1</td>
                                <td th:text="${registration.user.username}">username</td>
                                <td th:text="${registration.event.title}">event title</td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${registration.status}">PENDING</span>
                                </td>
                                <td th:text="${#temporals.format(registration.registrationDate, 'dd MMM yyyy, HH:mm')}">2026-01-01T10:00</td>
                                <td>
                                    <form th:if="${registration.status.name() == 'PENDING'}"
                                        th:action="@{/admin/registrations/{id}/approve(id=${registration.id})}"
                                        method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-outline-success">Approve</button>
                                    </form>

                                    <form th:if="${registration.status.name() == 'PENDING'}"
                                        th:action="@{/admin/registrations/{id}/reject(id=${registration.id})}"
                                        method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">Reject</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <nav class="mt-4" th:if="${totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link"
                        th:href="@{/admin/registrations(page=${currentPage - 1}, size=10, status=${selectedStatus}, sortField=${sortField}, sortDir=${sortDir})}">
                        Previous
                    </a>
                </li>

                <li class="page-item disabled">
                    <span class="page-link" th:text="'Page ' + (${currentPage} + 1) + ' of ' + ${totalPages}"></span>
                </li>

                <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                    <a class="page-link"
                        th:href="@{/admin/registrations(page=${currentPage + 1}, size=10, status=${selectedStatus}, sortField=${sortField}, sortDir=${sortDir})}">
                        Next
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <div th:replace="~{fragments/footer-scripts :: scripts}"></div>

</body>

</html>
