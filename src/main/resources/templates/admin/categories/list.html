<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories</title>
</head>
<body>
    <h1>Manage Categories</h1>

    <a th:href="@{/}">Back to Home</a>
    <br><br>

    <a th:href="@{/admin/categories/create}">Create New Category</a>
    <br><br>

    <div th:if="${#lists.isEmpty(categories)}">
        <p>No categories found.</p>
    </div>

    <div th:unless="${#lists.isEmpty(categories)}">
        <table border="1" cellpadding="10">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="category : ${categories}">
                    <td th:text="${category.id}">1</td>
                    <td th:text="${category.name}">Category Name</td>
                    <td th:text="${category.description}">Description</td>
                    <td>
                        <a th:href="@{/admin/categories/edit/{id}(id=${category.id})}">Edit</a>
                        |
                        <a th:href="@{/admin/categories/delete/{id}(id=${category.id})}"
                           onclick="return confirm('Are you sure you want to delete this category?');">
                            Delete
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
