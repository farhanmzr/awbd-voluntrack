<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head('Edit Profile')}"></head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="mb-4">Edit Profile</h1>

                        <form th:action="@{/profile/save}" th:object="${profile}" method="post">
                            <input type="hidden" th:field="*{id}" />

                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" th:field="*{fullName}" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="text" th:field="*{phoneNumber}" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Date of Birth</label>
                                <input type="date" th:field="*{dateOfBirth}" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">City</label>
                                <input type="text" th:field="*{city}" class="form-control">
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Bio</label>
                                <textarea th:field="*{bio}" class="form-control" rows="4"></textarea>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">Save Profile</button>
                                <a th:href="@{/profile}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer-scripts :: scripts}"></div>

</body>

</html>
