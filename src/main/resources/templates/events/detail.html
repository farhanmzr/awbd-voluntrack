<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head('Event Detail')}"></head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container py-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <a class="btn btn-outline-secondary btn-sm mb-3" th:href="@{/events}">Back to Event List</a>

                <h1 class="mb-3" th:text="${event.title}">Event Title</h1>

                <div class="row">
                    <div class="col-md-8">
                        <p><strong>Description:</strong></p>
                        <p th:text="${event.description}">Description</p>
                    </div>

                    <div class="col-md-4">
                        <ul class="list-group mb-3">
                            <li class="list-group-item"><strong>Status:</strong> <span
                                    th:text="${event.status}">OPEN</span></li>
                            <li class="list-group-item"><strong>Capacity:</strong> <span
                                    th:text="${event.capacity}">10</span></li>
                            <li class="list-group-item"><strong>Start:</strong> <span
                                    th:text="${event.startDateTime}">2026-01-01T10:00</span></li>
                            <li class="list-group-item"><strong>End:</strong> <span
                                    th:text="${event.endDateTime}">2026-01-01T12:00</span></li>
                            <li class="list-group-item"><strong>Category:</strong> <span
                                    th:text="${event.category.name}">Category</span></li>
                            <li class="list-group-item"><strong>Venue:</strong> <span
                                    th:text="${event.venue.name}">Venue</span></li>
                            <li class="list-group-item"><strong>City:</strong> <span
                                    th:text="${event.venue.city}">City</span></li>
                        </ul>
                    </div>
                </div>

                <form th:action="@{/registrations/join/{id}(id=${event.id})}" method="post" class="mt-3">
                    <button type="submit" class="btn btn-primary">Join Event</button>
                </form>

                <div class="mt-3">
                    <a th:href="@{/registrations/my}">Go to My Registrations</a>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer-scripts :: scripts}"></div>

</body>

</html>
