<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Detail - Volunteer Management Platform</title>
</head>
<body>
    <h1>Event Detail</h1>

    <a th:href="@{/events}">Back to Event List</a>
    <br><br>

    <h2 th:text="${event.title}">Event Title</h2>

    <p>
        <strong>Description:</strong>
        <span th:text="${event.description}">Description</span>
    </p>

    <p>
        <strong>Status:</strong>
        <span th:text="${event.status}">OPEN</span>
    </p>

    <p>
        <strong>Capacity:</strong>
        <span th:text="${event.capacity}">10</span>
    </p>

    <p>
        <strong>Start Date:</strong>
        <span th:text="${event.startDateTime}">2026-01-01T10:00</span>
    </p>

    <p>
        <strong>End Date:</strong>
        <span th:text="${event.endDateTime}">2026-01-01T12:00</span>
    </p>

    <p>
        <strong>Category:</strong>
        <span th:text="${event.category.name}">Category Name</span>
    </p>

    <p>
        <strong>Venue:</strong>
        <span th:text="${event.venue.name}">Venue Name</span>
    </p>

    <p>
        <strong>City:</strong>
        <span th:text="${event.venue.city}">City</span>
    </p>
</body>
</html>
