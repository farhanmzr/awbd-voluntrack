<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head('Volunteer Events')}"></head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0">Volunteer Events</h1>
            <a class="btn btn-outline-secondary" th:href="@{/}">Back to Home</a>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form method="get" th:action="@{/events}" class="row g-3">
                    <div class="col-md-4">
                        <label for="keyword" class="form-label">Search by title</label>
                        <input type="text" id="keyword" name="keyword" class="form-control" th:value="${keyword}">
                    </div>

                    <div class="col-md-3">
                        <label for="categoryId" class="form-label">Category</label>
                        <select name="categoryId" id="categoryId" class="form-select">
                            <option value="">All Categories</option>
                            <option th:each="category : ${categories}" th:value="${category.id}"
                                th:text="${category.name}"
                                th:selected="${categoryId != null and categoryId == category.id}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label for="sortField" class="form-label">Sort by</label>
                        <select name="sortField" id="sortField" class="form-select">
                            <option value="title" th:selected="${sortField == 'title'}">Title</option>
                            <option value="startDateTime" th:selected="${sortField == 'startDateTime'}">Start Date
                            </option>
                            <option value="status" th:selected="${sortField == 'status'}">Status</option>
                            <option value="capacity" th:selected="${sortField == 'capacity'}">Capacity</option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <label for="sortDir" class="form-label">Direction</label>
                        <select name="sortDir" id="sortDir" class="form-select">
                            <option value="asc" th:selected="${sortDir == 'asc'}">Ascending</option>
                            <option value="desc" th:selected="${sortDir == 'desc'}">Descending</option>
                        </select>
                    </div>

                    <div class="col-md-1 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Go</button>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(events)}" class="alert alert-info">
            No events available yet.
        </div>

        <div th:unless="${#lists.isEmpty(events)}" class="row g-4">
            <div class="col-md-6 col-lg-4" th:each="event : ${events}">
                <div class="card shadow-sm h-100">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${event.title}">Event Title</h5>
                        <p class="card-text text-muted mb-2" th:text="${event.description}">Description</p>

                        <ul class="list-unstyled small mb-3">
                            <li><strong>Status:</strong> <span th:text="${event.status}">OPEN</span></li>
                            <li><strong>Capacity:</strong> <span th:text="${event.capacity}">10</span></li>
                            <li><strong>Start:</strong> <span th:text="${event.startDateTime}">2026-01-01T10:00</span>
                            </li>
                        </ul>

                        <div class="mt-auto">
                            <a class="btn btn-outline-primary btn-sm" th:href="@{/events/{id}(id=${event.id})}">
                                View Details
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <nav class="mt-4" th:if="${totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link"
                        th:href="@{/events(page=${currentPage - 1}, size=5, sortField=${sortField}, sortDir=${sortDir}, keyword=${keyword}, categoryId=${categoryId})}">
                        Previous
                    </a>
                </li>

                <li class="page-item disabled">
                    <span class="page-link" th:text="'Page ' + (${currentPage} + 1) + ' of ' + ${totalPages}"></span>
                </li>

                <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                    <a class="page-link"
                        th:href="@{/events(page=${currentPage + 1}, size=5, sortField=${sortField}, sortDir=${sortDir}, keyword=${keyword}, categoryId=${categoryId})}">
                        Next
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <div th:replace="~{fragments/footer-scripts :: scripts}"></div>

</body>

</html>
