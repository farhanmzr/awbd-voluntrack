spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/voluntrack_db
    username: voluntrack_user
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false